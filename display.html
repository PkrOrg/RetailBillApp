<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Inventory Live</title>

<style>
  body {
    font-family: Arial;
    margin: 0;
    padding: 10px;
    background: #f5f5f5;
  }

  h2 {
    text-align: center;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }

  input, select, button {
    padding: 10px;
    font-size: 14px;
    flex: 1;
    min-width: 120px;
  }

  button {
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 6px;
  }

  .card {
    background: white;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    margin: 4px 0;
  }

  #groupView { display:none; }

  .group-card {
    background: white;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
  }

  .qty {
    font-weight: bold;
    color: green;
    font-size: 18px;
  }
#loadingOverlay {
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
  width: 100vw;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(.51px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
  /* ===== TABLE STYLE ===== */
  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
  }

  th, td {
    padding: 10px;
    border: 1px solid #ddd;
    text-align: left;
    font-size: 14px;
  }

  th {
    background: #4CAF50;
    color: white;
    position: sticky;
    top: 0;
  }
td {
    display: table-cell;
    vertical-align: inherit;
    unicode-bidi: isolate;
}  

  /* 🔥 ZEBRA ROW COLOR */
  tbody tr:nth-child(even) {
    background: yellow;
  }

  tbody tr:nth-child(4n+1) {
    background: #f2f6fa;
  }

  tbody tr:hover {
    background: #e6f7ff;
  }

  #groupView { display:none; }

  .qty {
    font-weight: bold;
    color: green;
    font-size: 18px;
  }


.loaderBox {
  text-align: center;
  font-size: 16px;
  color: #333;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #ddd;
  border-top: 4px solid #4CAF50;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 10px auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<h2>POS Inventory (Live Data)</h2>
<div id="loadingOverlay">
  <div class="loaderBox">
    <div class="spinner"></div>
    <div>Loading data...</div>
  </div>
</div>
<div class="controls">
  <input type="text" id="searchInput" placeholder="Search..." onkeyup="render()">

  <select id="columnFilter" onchange="updateValueDropdown()">
    <option value="">Column</option>
  </select>

  <select id="valueFilter" onchange="render()">
    <option value="">Value</option>
  </select>

  <button onclick="toggleGroup()">📦 Group</button>
<button onclick="resetFilters()">♻ Reset</button>
  <button onclick="loadData()">🔄 Reload</button>
</div>

<div id="listView"></div>
<div id="groupView"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzb705LWMxHhLasQiVbMwM6PPNMTJW3bNDBIbl_GNgTvSItL2gMMgeYb_oW9Fj_xj4fYQ/exec";

let headers = [];
let rows = [];
let filteredRows = [];
let groupMode = false;

/* LOAD DATA */
async function loadData(){
  document.getElementById("loadingOverlay").style.display = "flex";

  const res = await fetch(API_URL);
  const data = await res.json();

  headers = data[0];
  rows = data.slice(1);
  filteredRows = rows;

  initDropdown();
  render();
  document.getElementById("loadingOverlay").style.display = "none";
}

/* INIT DROPDOWN */
function initDropdown() {
  const colSel = document.getElementById("columnFilter");
  colSel.innerHTML = '<option value="">Column</option>';

  const valSel = document.getElementById("valueFilter");
  valSel.innerHTML = '<option value="">Value</option>';

  headers.forEach((h,i)=> {
    colSel.add(new Option(h,i));
  });
}

/* DATE ONLY */
function getDate(v){
  return v ? v.split(",")[0].trim() : "";
}

function normalizeValue(col, value){
  if(col == 5) return getDate(value);
  return value;
}
/* RENDER TABLE */
function render(){

  const search = searchInput.value.toLowerCase();
  const col = columnFilter.value;
  const val = valueFilter.value;

  filteredRows = rows.filter(r=>{

    if(col && val){
      let v = normalizeValue(col, r[col]);
      if(v != val) return false;
    }

    return r.join(" ").toLowerCase().includes(search);
  });

  const list = document.getElementById("listView");

  list.innerHTML = `
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Phone</th>
        <th>Items</th>
        <th>Total</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody>
  ${filteredRows.map((r, i)=>`
    <tr onclick="toggleDetails(${i})" style="cursor:pointer">
      <td>${r[0]}</td>
      <td>${r[1]}</td>
      <td>${r[2]}</td>
      <td>${r[3].length > 110 ? r[3].substring(0,110) + "..." : r[3]}</td>
      <td>${r[4]}</td>
      <td>${r[5]}</td>
    </tr>

    <tr id="detail-${i}" style="display:none;background:#f9f9f9">
      <td colspan="6">${r[3]}</td>
    </tr>
  `).join("")}
</tbody>
  </table>
  `;

  if(groupMode) renderGroup();
}

/* DROPDOWN VALUES */
function updateValueDropdown(){

  const col = columnFilter.value;
  const sel = document.getElementById("valueFilter");

  sel.innerHTML = '<option value="">Value</option>';

  if(!col) return;

  let vals = rows.map(r => normalizeValue(col, r[col]));

  [...new Set(vals)].forEach(v=>{
    sel.add(new Option(v,v));
  });

  render();
}

/* TOGGLE GROUP */
function toggleGroup(){
  groupMode = !groupMode;

  document.getElementById("groupView").style.display = groupMode ? "block" : "none";
  document.getElementById("listView").style.display = groupMode ? "none" : "block";

  if(groupMode) renderGroup();
}

/* 🔥 FIXED ITEM PARSER */
function parseItem(item){

  item = item.replace(/_x/g,"x").trim();

  let match = item.match(/x(\d+)\s*x(\d+)/);

  if(!match){
    return { qty: 1, price: 0, total: 0 };
  }

  let qty = parseInt(match[1]);
  let price = parseInt(match[2]);

  return {
    qty,
    price,
    total: qty * price
  };
}

/* 🔥 FIXED GROUP */
function renderGroup(){

  const map = {};

  filteredRows.forEach(r=>{

    r[3].split(",").forEach(it=>{
      
      let name = it.split(" _x")[1].trim();
      //name = name.replace(/[^a-zA-Z0-9 ]/g,"").trim();

      let p = parseItem(it);

      if(!map[name]){
        map[name] = {qty:0, price:0, total:0};
      }

      map[name].price = p.price;
      map[name].qty += p.qty;
      map[name].total += p.total;
    });
  });

  const g = document.getElementById("groupView");
  g.innerHTML = "";

  Object.keys(map).forEach(k=>{

    let item = map[k];
    let price = item.price;

    const div = document.createElement("div");
    div.className = "group-card";

    div.innerHTML = `
      <div><b>Product:</b> ${k}</div>
      <div>📦 Qty: <span class="qty">${item.qty}</span></div>
      <div>💰 Price: ${price}</div>
      <div>🧮 Total: ${item.total}</div>
    `;

    g.appendChild(div);
  });
}

/* INIT */
loadData();
function resetFilters(){

  // reset inputs
  document.getElementById("searchInput").value = "";
  document.getElementById("columnFilter").value = "";
  document.getElementById("valueFilter").innerHTML = '<option value="">Value</option>';

  // reset data
  filteredRows = rows;

  // rerender
  render();
}
function toggleDetails(i){
  const row = document.getElementById("detail-" + i);
  row.style.display = (row.style.display === "none") ? "table-row" : "none";
}
</script>

</body>
</html>
